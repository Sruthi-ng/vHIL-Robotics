name: Surgical Robotics vHIL Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-robotics-logic:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build vHIL Docker Container
      run: docker build -t surgical-robot-vhil .

    - name: Create Reports Directory on GitHub Host
      run: mkdir -p reports

    - name: Run Sanity Check (Safety-Critical)
      run: |
        docker run -v ${{ github.workspace }}/reports:/app/reports -e SCENARIO=critical surgical-robot-vhil

    - name: Run Sensor Validation Scenario
      run: |
        docker run -v ${{ github.workspace }}/reports:/app/reports -e SCENARIO=sensor surgical-robot-vhil

    - name: Upload Test Evidence (JUnit)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: vHIL-Test-Reports
        path: reports/